services:
  ai-log-server:
    build:
      context: .
      dockerfile: Containerfile
    container_name: ai-log-server
    env_file:
      - server/secrets.env
    environment:
      AI_LOG_HOST: "0.0.0.0"
      AI_LOG_PORT: "8888"
      AI_LOG_DATA_DIR: "/data"
    ports:
      - "8888:8888"
    volumes:
      - ./data:/data:Z
    restart: unless-stopped
